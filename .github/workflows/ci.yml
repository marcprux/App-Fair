name: ci

on:
  push:
    branches: ["**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write # release-asset upload on tag builds

jobs:
  app:
    uses: daybrite/actions/.github/workflows/build-day-app.yml@main
    secrets: inherit
    with:
      targets: android-widget
      day-version: main
      # The walkthrough runs against the bundled mock catalog (APP_FAIR_MOCK=1) so screenshots are
      # deterministic and offline — no 50 MB F-Droid index download in CI.
      scripts: dayscript/ci.yaml
      launch-env: APP_FAIR_MOCK=1
      locales: en fr
