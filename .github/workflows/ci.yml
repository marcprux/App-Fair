name: ci

on:
  push:
    branches: ["**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write # release-asset upload on tag builds

jobs:
  app:
    uses: daybrite/actions/.github/workflows/build-day-app.yml@main
    secrets: inherit
    with:
      targets: android-widget
      day-version: main
      scripts: dayscript/smoke.yaml
      locales: en fr
